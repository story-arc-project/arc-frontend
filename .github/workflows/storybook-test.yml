name: Storybook Test

on:
  pull_request:
    branches: [main, dev]

jobs:
  storybook-test:
    runs-on: ubuntu-latest
    # build-storybook + 전체 스토리 마운트(Playwright)라 기본 CI 잡보다 길다.
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # test-runner가 사용하는 playwright 버전에 맞는 chromium + OS 의존성 설치.
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # build-storybook → 정적 서빙 → 전체 스토리 마운트(렌더/콘솔 에러 0 검증).
      - name: Run Storybook test-runner
        run: npm run test-storybook:ci
