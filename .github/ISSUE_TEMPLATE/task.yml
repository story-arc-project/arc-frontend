name: "🛠️ Task"
description: 처리할 작업이 있어요
title: "[Task] "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: 📝 작업 내용
      description: 무엇을 할 작업인지 간결하게 설명해주세요.
      placeholder: 예) 헤더 컴포넌트의 sticky 동작 점검 및 개선
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: ✅ 체크리스트
      description: 세부 단계를 체크리스트로 적어주세요. (선택)
      value: |
        - [ ] TODO
        - [ ] TODO
        - [ ] TODO
    validations:
      required: false
